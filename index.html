<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تهنئة عيد الفطر المبارك 1447هـ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            background-color: #d6d2cc;
            background-image: url('brand-bg.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.82);
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #e2b04a, #f0d68a, #e2b04a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #c0b8d0;
            margin-bottom: 25px;
            text-align: center;
        }

        .main-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
        }

        .controls {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 28px;
            width: 330px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .controls label {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #e2b04a;
        }

        .gender-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .gender-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #a0aec0;
            font-family: 'Cairo', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .gender-btn:hover {
            border-color: rgba(226,176,74,0.4);
            background: rgba(226,176,74,0.08);
        }

        .gender-btn.active {
            border-color: #e2b04a;
            background: linear-gradient(135deg, rgba(226,176,74,0.2), rgba(226,176,74,0.08));
            color: #e2b04a;
            box-shadow: 0 0 20px rgba(226,176,74,0.15);
        }

        .controls input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 20px;
            text-align: right;
        }

        .controls input[type="text"]:focus { border-color: #e2b04a; }
        .controls input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }

        .photo-upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .photo-upload-area:hover {
            border-color: #e2b04a;
            background: rgba(226,176,74,0.05);
        }

        .photo-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .photo-upload-area .icon { font-size: 2.2rem; margin-bottom: 6px; }
        .photo-upload-area .text { font-size: 0.85rem; color: #a0aec0; }

        .photo-upload-area .preview-thumb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto;
            display: none;
            border: 3px solid #e2b04a;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e2b04a, #c8941e);
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(226,176,74,0.35);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #a0aec0;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .card-preview {
            position: relative;
            width: 360px;
            height: 640px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .card-preview img.template-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-overlay {
            position: absolute;
            bottom: 28px;
            right: 30px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.55rem;
            font-weight: 900;
            color: #3b2d6e;
            text-align: right;
            direction: rtl;
            max-width: 200px;
            line-height: 1.3;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        .photo-overlay {
            position: absolute;
            bottom: 52px;
            left: 18px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #3b2d6e;
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-overlay .placeholder-icon {
            font-size: 2.8rem;
            color: rgba(59,45,110,0.4);
        }

        #downloadCanvas { display: none; }

        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active { display: flex; }

        .loading-box {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            border: 1px solid rgba(226,176,74,0.3);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(226,176,74,0.2);
            border-top-color: #e2b04a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .instructions {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            background: rgba(226,176,74,0.08);
            border: 1px solid rgba(226,176,74,0.15);
            font-size: 0.8rem;
            color: #a0aec0;
            line-height: 1.7;
        }

        .instructions strong { color: #e2b04a; }

        @media (max-width: 768px) {
            h1 { font-size: 1.4rem; }
            .controls { width: 100%; max-width: 360px; }
            .card-preview { width: 320px; height: 568px; }
            .name-overlay { font-size: 1.3rem; bottom: 24px; right: 26px; }
            .photo-overlay { width: 110px; height: 110px; bottom: 44px; left: 14px; }
            .main-container { gap: 20px; }
        }
    </style>
</head>
<body>

    <h1>بطاقة تهنئة عيد الفطر المبارك 1447هـ</h1>
    <p class="subtitle">المعهد الوطني للتطوير المهني التعليمي</p>

    <div class="main-container">
        <div class="controls">
            <label>نوع البطاقة</label>
            <div class="gender-toggle">
                <button class="gender-btn active" id="btnBrother" onclick="selectGender('brother')">أخوكم</button>
                <button class="gender-btn" id="btnSister" onclick="selectGender('sister')">أختكم</button>
            </div>

            <label for="nameInput">اسم الموظف/ة</label>
            <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." oninput="updateName()">

            <label>الصورة الشخصية</label>
            <div class="photo-upload-area" id="uploadArea">
                <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
                <div class="icon" id="uploadIcon">📷</div>
                <div class="text" id="uploadText">اضغط لرفع صورتك الشخصية</div>
                <img class="preview-thumb" id="previewThumb">
            </div>

            <button class="btn btn-primary" onclick="downloadCard()">⬇ تحميل البطاقة</button>
            <button class="btn btn-secondary" onclick="resetForm()">🔄 إعادة تعيين</button>

            <div class="instructions">
                <strong>الخطوات:</strong><br>
                1. اختر نوع البطاقة (أخوكم / أختكم)<br>
                2. اكتب اسمك في الحقل<br>
                3. ارفع صورتك الشخصية (اختياري)<br>
                4. اضغط "تحميل البطاقة" للحفظ
            </div>
        </div>

        <div class="card-preview-wrapper">
            <div class="card-preview" id="cardPreview">
                <img class="template-bg" id="templateBg" src="template-brother.jpeg" crossorigin="anonymous">
                <div class="name-overlay" id="nameOverlay"></div>
                <div class="photo-overlay" id="photoOverlay">
                    <span class="placeholder-icon" id="photoPlaceholder">👤</span>
                    <img id="overlayPhoto" style="display:none;">
                </div>
            </div>
        </div>
    </div>

    <canvas id="downloadCanvas"></canvas>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <div>جاري تحضير البطاقة...</div>
        </div>
    </div>

    <script>
        let userPhoto = null;
        let currentGender = 'brother';

        const templates = {
            brother: 'template-brother.jpeg',
            sister: 'template-sister.jpeg'
        };

        function selectGender(gender) {
            currentGender = gender;
            document.getElementById('btnBrother').classList.toggle('active', gender === 'brother');
            document.getElementById('btnSister').classList.toggle('active', gender === 'sister');
            document.getElementById('templateBg').src = templates[gender];
        }

        function updateName() {
            document.getElementById('nameOverlay').textContent = document.getElementById('nameInput').value;
        }

        function handlePhoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                userPhoto = e.target.result;
                const thumb = document.getElementById('previewThumb');
                thumb.src = userPhoto;
                thumb.style.display = 'block';
                document.getElementById('uploadIcon').style.display = 'none';
                document.getElementById('uploadText').textContent = 'اضغط لتغيير الصورة';
                const overlayImg = document.getElementById('overlayPhoto');
                overlayImg.src = userPhoto;
                overlayImg.style.display = 'block';
                document.getElementById('photoPlaceholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function downloadCard() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) { alert('الرجاء كتابة الاسم أولاً'); return; }

            document.getElementById('loadingOverlay').classList.add('active');

            const canvas = document.getElementById('downloadCanvas');
            const ctx = canvas.getContext('2d');
            const W = 900, H = 1600;
            canvas.width = W;
            canvas.height = H;

            const templateImg = new Image();
            templateImg.crossOrigin = 'anonymous';
            templateImg.onload = function() {
                ctx.drawImage(templateImg, 0, 0, W, H);

                ctx.textAlign = 'right';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#3b2d6e';
                ctx.font = '900 56px Cairo, sans-serif';
                if (ctx.measureText(name).width > 460) {
                    ctx.font = '900 44px Cairo, sans-serif';
                }
                ctx.fillText(name, W - 60, H - 50);

                if (userPhoto) {
                    const photoImg = new Image();
                    photoImg.crossOrigin = 'anonymous';
                    photoImg.onload = function() {
                        const photoSize = 260;
                        const photoX = 35;
                        const photoY = H - 310;

                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(photoX + photoSize/2, photoY + photoSize/2, photoSize/2, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.clip();
                        ctx.drawImage(photoImg, photoX, photoY, photoSize, photoSize);
                        ctx.restore();

                        ctx.beginPath();
                        ctx.arc(photoX + photoSize/2, photoY + photoSize/2, photoSize/2, 0, Math.PI * 2);
                        ctx.strokeStyle = '#3b2d6e';
                        ctx.lineWidth = 5;
                        ctx.stroke();

                        finishDownload(canvas, name);
                    };
                    photoImg.src = userPhoto;
                } else {
                    finishDownload(canvas, name);
                }
            };
            templateImg.src = templates[currentGender];
        }

        function finishDownload(canvas, name) {
            setTimeout(() => {
                canvas.toBlob(function(blob) {
                    const genderText = currentGender === 'brother' ? 'أخوكم' : 'أختكم';
                    const link = document.createElement('a');
                    link.download = 'تهنئة_عيد_الفطر_' + genderText + '_' + name + '.png';
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    URL.revokeObjectURL(link.href);
                    document.getElementById('loadingOverlay').classList.remove('active');
                }, 'image/png');
            }, 300);
        }

        function resetForm() {
            document.getElementById('nameInput').value = '';
            document.getElementById('nameOverlay').textContent = '';
            document.getElementById('photoInput').value = '';
            userPhoto = null;
            document.getElementById('previewThumb').style.display = 'none';
            document.getElementById('uploadIcon').style.display = 'block';
            document.getElementById('uploadText').textContent = 'اضغط لرفع صورتك الشخصية';
            document.getElementById('overlayPhoto').style.display = 'none';
            document.getElementById('photoPlaceholder').style.display = 'inline';
            selectGender('brother');
        }
    </script>
</body>
</html>
